

<!DOCTYPE html>
{% load static %}
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Secrétariat</title>
    <link rel="stylesheet" href="{%  static 'css/login.css' %}">

</head>
<body>

<div class="login-container">

    <div class="logo-section">
        <div class="logo-icon"><i class="fas fa-user-tie"></i></div>
        <h1>Espace Secrétariat</h1>
        <p>Centre de Langues - Gestion Administrative</p>
        <span class="role-badge">Secrétaire</span>
    </div>

    <!-- Alerte -->
    <div class="alert" id="alert">
        <i class="fas fa-circle-exclamation" id="alert-icon"></i>
        <span id="alert-message"></span>
    </div>

    <!-- Countdown verrouillage -->
    <div class="countdown" id="countdown">
        <div class="countdown-time" id="countdown-time">30:00</div>
        <p><i class="fas fa-lock"></i> Compte temporairement verrouillé</p>
    </div>

    <form id="loginForm">
        <div class="form-group">
            <label>Adresse Email</label>
            <div class="input-wrapper">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="secretaire@centre.com"
                       required autocomplete="email">
            </div>
        </div>

        <div class="form-group">
            <label>Mot de Passe</label>
            <div class="input-wrapper">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="••••••••"
                       required autocomplete="current-password">
                <i class="fas fa-eye toggle-password" id="togglePwd"></i>
            </div>
        </div>

        <!-- Barre tentatives -->
        <div class="tentatives-bar" id="tentativesBar">
            <div class="tentatives-label" id="tentativesLabel"></div>
            <div class="tentatives-track">
                <div class="tentatives-fill" id="tentativesFill" style="width:0%"></div>
            </div>
        </div>

        <div class="options">
            <label class="remember">
                <input type="checkbox" id="rememberMe">
                <span>Se souvenir de moi</span>
            </label>
            <a href="#" class="forgot" id="forgotLink">Mot de passe oublié ?</a>
        </div>

        <button type="submit" class="btn-login" id="btnLogin">
            <span class="spinner"></span>
            <span class="btn-text">
                <i class="fas fa-sign-in-alt"></i> Accéder au Tableau de Bord
            </span>
        </button>
    </form>

    <div class="security-info">
        <p>
            <i class="fas fa-shield-alt"></i>
            Connexion sécurisée - Données cryptées
        </p>
    </div>

</div>

<script src="{% static 'js/login.js' %}"></script>
</body>
</html>
